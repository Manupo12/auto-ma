version: "3.9"

services:

  backend:
    build: ./backend
    container_name: fisio-backend
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/app/storage
      - ./backend/database.db:/app/database.db
    environment:
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY}
      - OPENCODE_GO_API_KEY=${OPENCODE_GO_API_KEY}
      - OPENCODE_GO_BASE_URL=${OPENCODE_GO_BASE_URL}
      - TOMY_COMPLETO_ENABLED=${TOMY_COMPLETO_ENABLED}
      - WORKFLOW_DB_PATH=${WORKFLOW_DB_PATH}
      - AUTH_PIN=${AUTH_PIN}
      - AUTH_SECRET=${AUTH_SECRET}
      - WORKSPACE_DIR=${WORKSPACE_DIR}
      - CORS_ORIGINS=${CORS_ORIGINS}
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: fisio-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  browser-use:
    image: python:3.11-slim
    container_name: fisio-browser
    volumes:
      - ./browser-use:/app/browser-use
      - ./storage/browser-logs:/logs
    environment:
      - MEDIFOLIOS_USER=${MEDIFOLIOS_USER}
      - MEDIFOLIOS_PASSWORD=${MEDIFOLIOS_PASSWORD}
      - POSITIVA_USER=${POSITIVA_USER}
      - POSITIVA_PASSWORD=${POSITIVA_PASSWORD}
    profiles:
      - fase2
    restart: unless-stopped
